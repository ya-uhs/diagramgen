<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>diagramgen</title>
<style>
  :root {
    --bg: #1e1f24; --panel: #26272e; --border: #3a3b44;
    --text: #e6e6ea; --dim: #9a9ba6; --accent: #7aa2f7; --err: #f7768e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; height: 100vh; display: flex; flex-direction: column;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, "Helvetica Neue", sans-serif; font-size: 14px;
  }
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 14px; border-bottom: 1px solid var(--border); flex: none;
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  header .spacer { flex: 1; }
  select, button {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px;
    font-size: 13px; cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  #status { color: var(--dim); font-size: 12px; }
  #status.err { color: var(--err); }
  #frontend { color: var(--dim); font-size: 12px; }
  main { flex: 1; display: flex; min-height: 0; }
  #left { width: 42%; min-width: 280px; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
  #tabs {
    display: flex; overflow-x: auto; flex: none; background: var(--panel);
    border-bottom: 1px solid var(--border); scrollbar-width: thin;
  }
  #tabs .tab {
    padding: 6px 12px; font-size: 12px; color: var(--dim); cursor: pointer;
    border-right: 1px solid var(--border); white-space: nowrap;
    font-family: "SF Mono", Menlo, monospace;
  }
  #tabs .tab.active { color: var(--text); background: var(--bg); }
  #src {
    flex: 1; resize: none; border: 0; outline: none; padding: 12px;
    background: var(--bg); color: var(--text);
    font: 12.5px/1.5 "SF Mono", Menlo, monospace; tab-size: 4; white-space: pre;
  }
  #src.dragover { outline: 2px dashed var(--accent); outline-offset: -6px; }
  #errors {
    display: none; max-height: 35%; overflow: auto; margin: 0; padding: 10px 12px;
    border-top: 1px solid var(--border); color: var(--err);
    font: 12px/1.45 "SF Mono", Menlo, monospace; white-space: pre-wrap;
  }
  header label.chk {
    color: var(--dim); font-size: 12px; display: flex; align-items: center;
    gap: 4px; cursor: pointer; white-space: nowrap;
  }
  #right { flex: 1; overflow: auto; background: #ffffff; position: relative; }
  #legend {
    position: sticky; left: 12px; bottom: 12px; display: inline-flex; gap: 12px;
    padding: 6px 12px; margin: 12px; background: rgba(255,255,255,.92);
    border: 1px solid #ccc; border-radius: 6px; font-size: 11px; color: #222;
    align-items: center; width: max-content;
  }
  #legend .sw { display: inline-block; width: 14px; height: 9px; border-radius: 4px;
    border: 1px solid rgba(0,0,0,.4); margin-right: 4px; vertical-align: -1px; }
  dialog {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 10px; padding: 18px 20px; min-width: 480px;
  }
  dialog::backdrop { background: rgba(0,0,0,.5); }
  dialog h3 { margin: 0 0 6px; font-size: 14px; }
  dialog .hint { color: var(--dim); font-size: 12px; margin: 0 0 12px; }
  .rule-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .rule-row input[type=text] {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 8px; font: 12px "SF Mono", Menlo, monospace;
  }
  .rule-row .pat { flex: 2; min-width: 0; }
  .rule-row .lab { flex: 1; min-width: 0; }
  .rule-row input[type=color] {
    width: 34px; height: 26px; padding: 1px; border: 1px solid var(--border);
    border-radius: 6px; background: var(--bg); cursor: pointer;
  }
  .dlg-actions { display: flex; gap: 8px; margin-top: 12px; }
  .dlg-actions #closeRules { margin-left: auto; }
  #diagram { padding: 16px; min-width: fit-content; }
  #diagram.stale { opacity: 0.4; }
  #diagram svg { display: block; }
</style>
</head>
<body>
<header>
  <h1>diagramgen</h1>
  <button id="openFiles">ファイルを開く</button>
  <button id="openDir">フォルダを開く</button>
  <label for="module" style="color:var(--dim)">module:</label>
  <select id="module"></select>
  <label for="theme" style="color:var(--dim)">theme:</label>
  <select id="theme"></select>
  <label class="chk"><input type="checkbox" id="showLabels" checked>信号ラベル</label>
  <label class="chk"><input type="checkbox" id="hideClk">clk/rst非表示</label>
  <button id="rulesBtn">色ルール</button>
  <div class="spacer"></div>
  <span id="frontend"></span>
  <span id="status"></span>
  <input type="file" id="pickFiles" multiple accept=".v,.sv,.svh,.vh" hidden>
  <input type="file" id="pickDir" webkitdirectory hidden>
</header>
<dialog id="rulesDlg">
  <h3>信号ラベルの色ルール</h3>
  <p class="hint">ネット名にマッチする正規表現(大文字小文字無視、上から先勝ち)。設定はブラウザに保存されます。</p>
  <div id="rulesList"></div>
  <div class="dlg-actions">
    <button id="addRule">+ 追加</button>
    <button id="resetRules">初期値に戻す</button>
    <button id="closeRules">閉じる</button>
  </div>
</dialog>
<main>
  <div id="left">
    <div id="tabs"></div>
    <textarea id="src" spellcheck="false" placeholder="// SystemVerilog をここに(ファイルのドロップも可)"></textarea>
    <pre id="errors"></pre>
  </div>
  <div id="right"><div id="diagram"></div></div>
</main>
<script src="vendor/elk.bundled.js"></script>
<script src="vendor/netlistsvg.bundle.js"></script>
<script>
const $src = document.getElementById('src');
const $tabs = document.getElementById('tabs');
const $module = document.getElementById('module');
const $status = document.getElementById('status');
const $errors = document.getElementById('errors');
const $diagram = document.getElementById('diagram');
const $frontend = document.getElementById('frontend');

let skin = null;
let netlist = null;
let timer = null;
let frontend = null;   // 'slang' (server) | 'yosys' (wasm in browser)
let yosysMod = null;
let files = [{ name: 'design.sv', content: '' }];
let active = 0;

function setStatus(text, isErr = false) {
  $status.textContent = text;
  $status.className = isErr ? 'err' : '';
}

// ---- file tabs -------------------------------------------------------

function syncActive() { files[active].content = $src.value; }

function renderTabs() {
  $tabs.innerHTML = '';
  files.forEach((f, i) => {
    const el = document.createElement('div');
    el.className = 'tab' + (i === active ? ' active' : '');
    el.textContent = f.name;
    el.onclick = () => { syncActive(); active = i; $src.value = f.content; renderTabs(); };
    $tabs.appendChild(el);
  });
  $tabs.style.display = files.length > 1 ? 'flex' : 'none';
}

const RTL_EXT = /\.(sv|v|svh|vh)$/i;

async function loadFileList(fileList) {
  const picked = [...fileList].filter(f => RTL_EXT.test(f.name));
  if (!picked.length) { setStatus('RTLファイル(.v/.sv)が見つかりません', true); return; }
  files = await Promise.all(picked.map(async f => ({
    name: (f.webkitRelativePath || f.name).replace(/[^\w./-]/g, '_'),
    content: await f.text(),
  })));
  files.sort((a, b) => a.name.localeCompare(b.name));
  active = 0;
  $src.value = files[0].content;
  renderTabs();
  await compile();
}

document.getElementById('openFiles').onclick = () => document.getElementById('pickFiles').click();
document.getElementById('openDir').onclick = () => document.getElementById('pickDir').click();
document.getElementById('pickFiles').onchange = (e) => loadFileList(e.target.files);
document.getElementById('pickDir').onchange = (e) => loadFileList(e.target.files);

$src.addEventListener('dragover', (e) => { e.preventDefault(); $src.classList.add('dragover'); });
$src.addEventListener('dragleave', () => $src.classList.remove('dragover'));
$src.addEventListener('drop', async (e) => {
  e.preventDefault();
  $src.classList.remove('dragover');
  if (e.dataTransfer.files.length) await loadFileList(e.dataTransfer.files);
});

// ---- frontends -------------------------------------------------------

async function detectFrontend() {
  try {
    const r = await fetch('api/netlist', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source: 'module __probe__(); endmodule' }),
    });
    if (r.ok) { frontend = 'slang'; }
  } catch (e) { /* no server */ }
  if (!frontend) frontend = 'yosys';
  $frontend.textContent = frontend === 'slang'
    ? 'frontend: slang (server)' : 'frontend: yosys (wasm)';
}

async function compileSlang(sources) {
  const resp = await fetch('api/netlist', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ files: sources }),
  });
  return resp.json();
}

async function compileYosys(sources) {
  if (!yosysMod) {
    setStatus('yosys-wasm 読み込み中…(初回は数十MBのダウンロード)');
    yosysMod = await import('./vendor/yowasp/bundle.js');
  }
  const fsFiles = {};
  const names = [];
  for (const f of sources) {
    const name = f.name.replaceAll('/', '_');
    fsFiles[name] = f.content;
    names.push(name);
  }
  const script = `read_verilog -sv ${names.join(' ')}; ` +
    'hierarchy -auto-top; proc; delete */t:$*; write_json out.json';
  let stderr = '';
  const decoder = new TextDecoder();
  try {
    const out = await yosysMod.runYosys(
      ['-q', '-p', script], fsFiles,
      { stdout: null, stderr: (b) => { if (b) stderr += decoder.decode(b); } },
    );
    return { ok: true, netlist: JSON.parse(String(out['out.json'])) };
  } catch (e) {
    return { ok: false, error: stderr || String(e) };
  }
}

// ---- compile & render ------------------------------------------------

async function compile() {
  syncActive();
  setStatus('コンパイル中…');
  const sources = files.map(f => ({ name: f.name, content: f.content }));
  const result = frontend === 'slang'
    ? await compileSlang(sources)
    : await compileYosys(sources);
  if (!result.ok) {
    $errors.textContent = result.error;
    $errors.style.display = 'block';
    $diagram.classList.add('stale');
    setStatus('エラー', true);
    return;
  }
  $errors.style.display = 'none';
  netlist = result.netlist;
  updateModuleList();
  await renderModule();
}

function updateModuleList() {
  const names = Object.keys(netlist.modules);
  const prev = $module.value;
  $module.innerHTML = '';
  for (const name of names) {
    const opt = document.createElement('option');
    opt.value = opt.textContent = name;
    $module.appendChild(opt);
  }
  if (names.includes(prev)) {
    $module.value = prev;
  } else {
    const top = names.find(n => Number(netlist.modules[n].attributes?.top) === 1
      || /1$/.test(String(netlist.modules[n].attributes?.top ?? '')));
    $module.value = top ?? names[0];
  }
}

// ---- theming ---------------------------------------------------------
// All visual styling lives here: swap fonts, wire colors, background and
// the per-module-type palette per theme. Cell colors are derived from a
// hash of the module type name, so a given module keeps its color across
// edits, reloads and sessions.

const SANS = 'ui-sans-serif, -apple-system, "Helvetica Neue", Arial, sans-serif';
const MONO = '"SF Mono", Menlo, Consolas, monospace';

const THEMES = {
  pastel: {
    label: 'Pastel',
    font: SANS, bg: '#ffffff',
    wire: '#565a6e', wireWidth: 1.1, text: '#1a1a22',
    marker: '#eceef4', markerStroke: '#565a6e',
    cellFill: (h) => `hsl(${h} 60% 91%)`,
    cellStroke: (h) => `hsl(${h} 45% 42%)`,
  },
  classic: {
    label: 'Classic',
    font: MONO, bg: '#ffffff',
    wire: '#000000', wireWidth: 1.25, text: '#000000',
    marker: '#ffffff', markerStroke: '#000000',
    cellFill: () => '#ffffff',
    cellStroke: () => '#000000',
  },
  blueprint: {
    label: 'Blueprint',
    font: SANS, bg: '#153050',
    wire: '#a9c7e8', wireWidth: 1.1, text: '#eaf2fb',
    marker: '#1d4066', markerStroke: '#a9c7e8',
    cellFill: (h) => `hsl(${h} 45% 28% / 0.85)`,
    cellStroke: (h) => `hsl(${h} 65% 75%)`,
  },
};

let theme = localStorage.getItem('diagramgen-theme') || 'pastel';
if (!THEMES[theme]) theme = 'pastel';

const $theme = document.getElementById('theme');
for (const [key, t] of Object.entries(THEMES)) {
  const opt = document.createElement('option');
  opt.value = key; opt.textContent = t.label;
  $theme.appendChild(opt);
}
$theme.value = theme;
$theme.onchange = () => {
  theme = $theme.value;
  localStorage.setItem('diagramgen-theme', theme);
  renderModule();
};

// Deterministic hue per module type name.
function hueOf(name) {
  let h = 0;
  for (const c of name) h = (h * 31 + c.codePointAt(0)) >>> 0;
  return h % 360;
}

// ---- datasheet-style net labels ---------------------------------------
// Nets are classified by user-editable rules (regex -> label/color) and get
// a colored capsule label on their longest wire segment, plus a legend —
// in the spirit of hand-drawn datasheet block diagrams. Rules are edited
// in the UI (色ルール) and persisted to localStorage; first match wins.

const DEFAULT_RULES = [
  { pattern: 'i2c|i2s|scl|sda',      label: 'I2C/I2S', color: '#1565c0' },
  { pattern: 'spi|mosi|miso|sclk',   label: 'SPI',     color: '#7cc0f4' },
  { pattern: 'uart|usart|txd?$|rxd?$', label: 'UART',  color: '#c85d96' },
  { pattern: 'pwm',                  label: 'PWM',     color: '#8ee6b8' },
  { pattern: 'clk|clock|rst|reset',  label: 'CLK/RST', color: '#e0e0e4' },
];
const OTHER_RULE = { label: 'Other', color: '#ffffff' };

function loadRules() {
  try {
    const r = JSON.parse(localStorage.getItem('diagramgen-netrules'));
    if (Array.isArray(r)) return r;
  } catch (e) { /* fall through */ }
  return JSON.parse(JSON.stringify(DEFAULT_RULES));
}
let rules = loadRules();
function saveRules() {
  localStorage.setItem('diagramgen-netrules', JSON.stringify(rules));
}

// Derive readable text/stroke colors from the rule's fill color.
function ruleStyle(color) {
  const [r, g, b] = [1, 3, 5].map(i => parseInt(color.slice(i, i + 2), 16) || 0);
  const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
  return {
    fill: color,
    text: lum > 0.62 ? '#1a1a1a' : '#ffffff',
    stroke: `rgb(${r * 0.55 | 0} ${g * 0.55 | 0} ${b * 0.55 | 0})`,
  };
}

function classifyNet(name) {
  for (const rule of rules) {
    try {
      if (rule.pattern && new RegExp(rule.pattern, 'i').test(name)) return rule;
    } catch (e) { /* invalid user regex: skip */ }
  }
  return OTHER_RULE;
}

function drawNetLabels(svg, mod) {
  const usedClasses = new Set();
  for (const [name, nn] of Object.entries(mod.netnames || {})) {
    if (nn.hide_name || name.startsWith('$')) continue;
    const id = (nn.bits || []).find(b => typeof b === 'number');
    if (id == null) continue;
    const segs = [...svg.querySelectorAll(`line.${CSS.escape('net_' + id)}`)];
    if (!segs.length) continue;
    let best = null, bestLen = 0;
    for (const s of segs) {
      const dx = Math.abs(s.x2.baseVal.value - s.x1.baseVal.value);
      const dy = Math.abs(s.y2.baseVal.value - s.y1.baseVal.value);
      const len = dx + dy + (dx > dy ? 15 : 0);  // prefer horizontal runs
      if (len > bestLen) { bestLen = len; best = s; }
    }
    const shown = name.length * 6.2 + 16;
    if (bestLen < Math.max(70, shown)) continue;  // segment too short to label
    const cls = classifyNet(name);
    const st = ruleStyle(cls.color);
    usedClasses.add(cls.label);
    const mx = (best.x1.baseVal.value + best.x2.baseVal.value) / 2;
    const my = (best.y1.baseVal.value + best.y2.baseVal.value) / 2;
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', mx - shown / 2); rect.setAttribute('y', my - 7.5);
    rect.setAttribute('width', shown); rect.setAttribute('height', 15);
    rect.setAttribute('rx', 7.5);
    rect.setAttribute('fill', st.fill); rect.setAttribute('stroke', st.stroke);
    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', mx); label.setAttribute('y', my + 3.2);
    label.setAttribute('text-anchor', 'middle');
    label.setAttribute('style', `font-size:9.5px; fill:${st.text} !important; font-weight:600;`);
    label.textContent = name;
    g.append(rect, label);
    svg.append(g);
  }
  renderLegend(usedClasses);
}

function renderLegend(usedClasses) {
  document.getElementById('legend')?.remove();
  if (!usedClasses.size) return;
  const div = document.createElement('div');
  div.id = 'legend';
  for (const c of [...rules, OTHER_RULE]) {
    if (!usedClasses.has(c.label)) continue;
    const item = document.createElement('span');
    const sw = document.createElement('span');
    sw.className = 'sw'; sw.style.background = c.color;
    item.append(sw, c.label);
    div.appendChild(item);
  }
  document.getElementById('right').appendChild(div);
}

// ---- rules editor ------------------------------------------------------

function renderRulesEditor() {
  const list = document.getElementById('rulesList');
  list.innerHTML = '';
  rules.forEach((rule, i) => {
    const row = document.createElement('div');
    row.className = 'rule-row';
    const pat = document.createElement('input');
    pat.type = 'text'; pat.value = rule.pattern; pat.placeholder = '正規表現';
    pat.className = 'pat';
    const lab = document.createElement('input');
    lab.type = 'text'; lab.value = rule.label; lab.placeholder = 'ラベル';
    lab.className = 'lab';
    const col = document.createElement('input');
    col.type = 'color'; col.value = rule.color;
    const del = document.createElement('button');
    del.textContent = '✕'; del.title = '削除';
    pat.onchange = () => { rule.pattern = pat.value; onRulesChanged(); };
    lab.onchange = () => { rule.label = lab.value; onRulesChanged(); };
    col.onchange = () => { rule.color = col.value; onRulesChanged(); };
    del.onclick = () => { rules.splice(i, 1); renderRulesEditor(); onRulesChanged(); };
    row.append(pat, lab, col, del);
    list.appendChild(row);
  });
}

function onRulesChanged() {
  saveRules();
  renderModule();
}

document.getElementById('rulesBtn').onclick = () => {
  renderRulesEditor();
  document.getElementById('rulesDlg').showModal();
};
document.getElementById('addRule').onclick = () => {
  rules.push({ pattern: '', label: 'NEW', color: '#f2b344' });
  renderRulesEditor();
};
document.getElementById('resetRules').onclick = () => {
  rules = JSON.parse(JSON.stringify(DEFAULT_RULES));
  renderRulesEditor();
  onRulesChanged();
};
document.getElementById('closeRules').onclick = () =>
  document.getElementById('rulesDlg').close();

// Remove clock/reset plumbing from a module (datasheet diagrams omit it).
const CLKRST_RE = /(^|[._])(clk|clock|rst|reset)(_n|_ni|_i)?([._]|$)/i;

function pruneClockReset(mod) {
  const hidden = new Set();
  for (const [name, nn] of Object.entries(mod.netnames || {})) {
    if (CLKRST_RE.test(name)) (nn.bits || []).forEach(b => hidden.add(b));
  }
  for (const [pname, port] of Object.entries(mod.ports || {})) {
    if (CLKRST_RE.test(pname)) {
      (port.bits || []).forEach(b => hidden.add(b));
      delete mod.ports[pname];
    }
  }
  for (const cell of Object.values(mod.cells || {})) {
    for (const [pn, bits] of Object.entries(cell.connections || {})) {
      if (CLKRST_RE.test(pn) || (bits.length && bits.every(b => hidden.has(b)))) {
        delete cell.connections[pn];
        delete cell.port_directions?.[pn];
      }
    }
  }
  for (const [name, nn] of Object.entries(mod.netnames || {})) {
    if ((nn.bits || []).some(b => hidden.has(b))) delete mod.netnames[name];
  }
}

function stylize(mod) {
  const svg = $diagram.querySelector('svg');
  if (!svg) return;
  const t = THEMES[theme];
  document.getElementById('right').style.background = t.bg;
  const style = document.createElementNS('http://www.w3.org/2000/svg', 'style');
  style.textContent = `
    text { font-family: ${t.font} !important; fill: ${t.text} !important; }
    line { stroke: ${t.wire}; stroke-width: ${t.wireWidth}; stroke-linecap: round; }
    circle { fill: ${t.wire} !important; }
    path { fill: ${t.marker}; stroke: ${t.markerStroke}; stroke-width: 1.25; }
  `;
  svg.append(style);
  for (const [inst, cell] of Object.entries(mod.cells || {})) {
    if (cell.type.startsWith('$')) continue;
    const g = svg.querySelector(`#${CSS.escape('cell_' + inst)}`);
    if (!g) continue;
    const hue = hueOf(cell.type);
    for (const rect of g.querySelectorAll(':scope > rect, rect')) {
      rect.setAttribute('fill', t.cellFill(hue));
      rect.setAttribute('stroke', t.cellStroke(hue));
      rect.setAttribute('stroke-width', '1.5');
      rect.setAttribute('rx', '3');
      break; // only the body rect
    }
  }
}

async function renderModule() {
  if (!netlist || !skin) return;
  const copy = JSON.parse(JSON.stringify(netlist));
  for (const [name, mod] of Object.entries(copy.modules)) {
    mod.attributes = mod.attributes || {};
    mod.attributes.top = name === $module.value ? 1 : 0;
  }
  const mod = copy.modules[$module.value];
  if (document.getElementById('hideClk').checked) pruneClockReset(mod);
  try {
    const svg = await netlistsvg.render(skin, copy);
    $diagram.innerHTML = svg;
    stylize(mod);
    if (document.getElementById('showLabels').checked) {
      drawNetLabels($diagram.querySelector('svg'), mod);
    } else {
      renderLegend(new Set());
    }
    $diagram.classList.remove('stale');
    setStatus('OK');
  } catch (e) {
    setStatus('レイアウト失敗: ' + e.message, true);
  }
}

$src.addEventListener('input', () => {
  clearTimeout(timer);
  timer = setTimeout(compile, 500);
});
$module.addEventListener('change', renderModule);
document.getElementById('showLabels').addEventListener('change', renderModule);
document.getElementById('hideClk').addEventListener('change', renderModule);

(async function init() {
  skin = await (await fetch('vendor/default.svg')).text();
  const sample = await fetch('sample.sv');
  if (sample.ok) {
    files = [{ name: 'soc.sv', content: await sample.text() }];
    $src.value = files[0].content;
  }
  renderTabs();
  await detectFrontend();
  await compile();
})();
</script>
</body>
</html>
