<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>diagramgen</title>
<style>
  :root {
    --bg: #1e1f24; --panel: #26272e; --border: #3a3b44;
    --text: #e6e6ea; --dim: #9a9ba6; --accent: #7aa2f7; --err: #f7768e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; height: 100vh; display: flex; flex-direction: column;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, "Helvetica Neue", sans-serif; font-size: 14px;
  }
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 14px; border-bottom: 1px solid var(--border); flex: none;
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  header .spacer { flex: 1; }
  select, button {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px;
    font-size: 13px; cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  #status { color: var(--dim); font-size: 12px; }
  #status.err { color: var(--err); }
  #frontend { color: var(--dim); font-size: 12px; }
  main { flex: 1; display: flex; min-height: 0; }
  #left { width: 42%; min-width: 280px; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
  #tabs {
    display: flex; overflow-x: auto; flex: none; background: var(--panel);
    border-bottom: 1px solid var(--border); scrollbar-width: thin;
  }
  #tabs .tab {
    padding: 6px 12px; font-size: 12px; color: var(--dim); cursor: pointer;
    border-right: 1px solid var(--border); white-space: nowrap;
    font-family: "SF Mono", Menlo, monospace;
  }
  #tabs .tab.active { color: var(--text); background: var(--bg); }
  #src {
    flex: 1; resize: none; border: 0; outline: none; padding: 12px;
    background: var(--bg); color: var(--text);
    font: 12.5px/1.5 "SF Mono", Menlo, monospace; tab-size: 4; white-space: pre;
  }
  #src.dragover { outline: 2px dashed var(--accent); outline-offset: -6px; }
  #errors {
    display: none; max-height: 35%; overflow: auto; margin: 0; padding: 10px 12px;
    border-top: 1px solid var(--border); color: var(--err);
    font: 12px/1.45 "SF Mono", Menlo, monospace; white-space: pre-wrap;
  }
  header label.chk {
    color: var(--dim); font-size: 12px; display: flex; align-items: center;
    gap: 4px; cursor: pointer; white-space: nowrap;
  }
  #right { flex: 1; overflow: hidden; background: #ffffff; position: relative; }
  #diagramWrap { position: absolute; inset: 0; overflow: hidden; cursor: grab; }
  #diagramWrap.panning { cursor: grabbing; }
  #diagram svg { transform-origin: 0 0; }
  #diagram svg g[id^="cell_"] { cursor: pointer; }
  #diagram svg line.hi { stroke: #ff5d8f !important; stroke-width: 2.4 !important; }
  #toolbar {
    position: absolute; top: 10px; right: 10px; z-index: 5;
    display: flex; gap: 6px; padding: 5px 7px;
    background: rgba(30,31,36,.88); border: 1px solid var(--border);
    border-radius: 8px;
  }
  #toolbar button { padding: 3px 9px; font-size: 12px; }
  #tooltip {
    position: fixed; z-index: 20; display: none; pointer-events: none;
    background: rgba(20,20,26,.94); color: #eee; padding: 3px 9px;
    border-radius: 6px; font: 12px "SF Mono", Menlo, monospace;
  }
  #errors .errloc { text-decoration: underline; cursor: pointer; }
  #legend {
    position: absolute; left: 12px; bottom: 12px; display: inline-flex; gap: 12px;
    padding: 6px 12px; background: rgba(255,255,255,.92); z-index: 5;
    border: 1px solid #ccc; border-radius: 6px; font-size: 11px; color: #222;
    align-items: center; width: max-content;
  }
  #legend .sw { display: inline-block; width: 14px; height: 9px; border-radius: 4px;
    border: 1px solid rgba(0,0,0,.4); margin-right: 4px; vertical-align: -1px; }
  dialog {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 10px; padding: 18px 20px; min-width: 480px;
  }
  dialog::backdrop { background: rgba(0,0,0,.5); }
  dialog h3 { margin: 0 0 6px; font-size: 14px; }
  dialog .hint { color: var(--dim); font-size: 12px; margin: 0 0 12px; }
  .rule-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .rule-row input[type=text] {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 8px; font: 12px "SF Mono", Menlo, monospace;
  }
  .rule-row .pat { flex: 2; min-width: 0; }
  .rule-row .lab { flex: 1; min-width: 0; }
  .rule-row input[type=color] {
    width: 34px; height: 26px; padding: 1px; border: 1px solid var(--border);
    border-radius: 6px; background: var(--bg); cursor: pointer;
  }
  .dlg-actions { display: flex; gap: 8px; margin: 12px 0 16px; }
  .dlg-actions #closeRules { margin-left: auto; }
  dialog h3 { margin-top: 4px; }
  .tunables { display: flex; gap: 18px; margin: 4px 0; }
  .tunables label { color: var(--dim); font-size: 12px; display: flex;
    align-items: center; gap: 6px; }
  .tunables input {
    width: 70px; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 4px 6px;
  }
  #diagram.stale { opacity: 0.4; }
  #diagram svg { display: block; }
</style>
</head>
<body>
<header>
  <h1>diagramgen</h1>
  <button id="openFiles">ファイルを開く</button>
  <button id="openDir">フォルダを開く</button>
  <label for="viewMode" style="color:var(--dim)">view:</label>
  <select id="viewMode">
    <option value="block">ブロック図</option>
    <option value="fsm">FSM</option>
  </select>
  <label for="module" style="color:var(--dim)">module:</label>
  <select id="module"></select>
  <label for="theme" style="color:var(--dim)">theme:</label>
  <select id="theme"></select>
  <label class="chk" title="ポート方向の多数決でマスター→スレーブの意味順(CPU→バス→周辺)に配置する"><input type="checkbox" id="semanticOrder" checked>意味順配置</label>
  <label class="chk"><input type="checkbox" id="showLabels" checked>信号ラベル</label>
  <label class="chk" title="「非表示」フラグ付きの色ルールにマッチするネットを図から除く"><input type="checkbox" id="hideClk">非表示ルール適用</label>
  <button id="rulesBtn">設定</button>
  <div class="spacer"></div>
  <span id="frontend"></span>
  <span id="status"></span>
  <input type="file" id="pickFiles" multiple accept=".v,.sv,.svh,.vh" hidden>
  <input type="file" id="pickDir" webkitdirectory hidden>
</header>
<dialog id="rulesDlg">
  <h3>信号(ネット名)の色ルール</h3>
  <p class="hint">正規表現でマッチ(大文字小文字無視、上から先勝ち)。「非表示」は「非表示ルール適用」ON時に図から除きます。設定はブラウザに保存されます。</p>
  <div id="rulesList"></div>
  <div class="dlg-actions">
    <button id="addRule">+ 追加</button>
    <button id="resetRules">初期値に戻す</button>
  </div>
  <h3>モジュールの色ルール</h3>
  <p class="hint">モジュール型名にマッチしたら固定色(未マッチはテーマのパレット)。「非表示」でそのモジュールのインスタンスを図から除きます。</p>
  <div id="modRulesList"></div>
  <div class="dlg-actions">
    <button id="addModRule">+ 追加</button>
  </div>
  <h3>チューニング</h3>
  <div class="tunables">
    <label>再コンパイル待ち (ms) <input type="number" id="setDebounce" min="100" max="5000" step="100"></label>
    <label>ラベル最小配線長 (px) <input type="number" id="setMinSeg" min="0" max="500" step="10"></label>
  </div>
  <div class="dlg-actions">
    <button id="resetSrc" title="エディタの内容を破棄してサンプルを読み込む">サンプルに戻す</button>
    <button id="closeRules">閉じる</button>
  </div>
</dialog>
<main>
  <div id="left">
    <div id="tabs"></div>
    <textarea id="src" spellcheck="false" placeholder="// SystemVerilog をここに(ファイルのドロップも可)"></textarea>
    <pre id="errors"></pre>
  </div>
  <div id="right">
    <div id="toolbar">
      <button id="navBack" style="display:none" title="上の階層へ戻る">← 戻る</button>
      <button id="zoomOut" title="縮小">−</button>
      <button id="zoomFit" title="全体表示">Fit</button>
      <button id="zoomIn" title="拡大">+</button>
      <button id="dlSvg" title="SVGをダウンロード">SVG</button>
      <button id="dlPng" title="PNGをダウンロード">PNG</button>
    </div>
    <div id="diagramWrap"><div id="diagram"></div></div>
  </div>
</main>
<div id="tooltip"></div>
<script src="vendor/netlistsvg.bundle.js"></script>
<script>
const $src = document.getElementById('src');
const $tabs = document.getElementById('tabs');
const $module = document.getElementById('module');
const $status = document.getElementById('status');
const $errors = document.getElementById('errors');
const $diagram = document.getElementById('diagram');
const $frontend = document.getElementById('frontend');

const skins = {};
async function getSkin(url) {
  if (!skins[url]) skins[url] = await (await fetch(url)).text();
  return skins[url];
}

let netlist = null;
let timer = null;
let frontend = null;   // 'slang' (server) | 'yosys' (wasm in browser)
let yosysMod = null;
let files = [{ name: 'design.sv', content: '' }];
let active = 0;

// View state for pan/zoom, hierarchy navigation and hover lookups.
const view = { s: 1, tx: 16, ty: 16 };
let fitPending = true;
let currentModule = null;         // module data of the rendered diagram
const netNameById = new Map();    // net id -> display name
const navStack = [];              // for drill-down "back"

// FSM view state.
let viewMode = 'block';           // 'block' | 'fsm'
let fsms = [];                    // FSMs extracted by yosys (fsm_export)
let fsmsStale = true;

function setStatus(text, isErr = false) {
  $status.textContent = text;
  $status.className = isErr ? 'err' : '';
}

// ---- file tabs -------------------------------------------------------

function syncActive() { files[active].content = $src.value; }

function persistSrc() {
  syncActive();
  try {
    localStorage.setItem('diagramgen-src', JSON.stringify({ files, active }));
  } catch (e) { /* quota exceeded: skip persistence */ }
}

function restoreSrc() {
  try {
    const saved = JSON.parse(localStorage.getItem('diagramgen-src'));
    if (saved && Array.isArray(saved.files) && saved.files.length) {
      files = saved.files;
      active = Math.min(saved.active || 0, files.length - 1);
      return true;
    }
  } catch (e) { /* corrupted: ignore */ }
  return false;
}

function renderTabs() {
  $tabs.innerHTML = '';
  files.forEach((f, i) => {
    const el = document.createElement('div');
    el.className = 'tab' + (i === active ? ' active' : '');
    el.textContent = f.name;
    el.onclick = () => { syncActive(); active = i; $src.value = f.content; renderTabs(); };
    $tabs.appendChild(el);
  });
  $tabs.style.display = files.length > 1 ? 'flex' : 'none';
}

const RTL_EXT = /\.(sv|v|svh|vh)$/i;

async function loadFileList(fileList) {
  const picked = [...fileList].filter(f => RTL_EXT.test(f.name));
  if (!picked.length) { setStatus('RTLファイル(.v/.sv)が見つかりません', true); return; }
  files = await Promise.all(picked.map(async f => ({
    name: (f.webkitRelativePath || f.name).replace(/[^\w./-]/g, '_'),
    content: await f.text(),
  })));
  files.sort((a, b) => a.name.localeCompare(b.name));
  active = 0;
  $src.value = files[0].content;
  renderTabs();
  persistSrc();
  fitPending = true;
  await compile();
}

document.getElementById('openFiles').onclick = () => document.getElementById('pickFiles').click();
document.getElementById('openDir').onclick = () => document.getElementById('pickDir').click();
document.getElementById('pickFiles').onchange = (e) => loadFileList(e.target.files);
document.getElementById('pickDir').onchange = (e) => loadFileList(e.target.files);

$src.addEventListener('dragover', (e) => { e.preventDefault(); $src.classList.add('dragover'); });
$src.addEventListener('dragleave', () => $src.classList.remove('dragover'));
$src.addEventListener('drop', async (e) => {
  e.preventDefault();
  $src.classList.remove('dragover');
  if (e.dataTransfer.files.length) await loadFileList(e.dataTransfer.files);
});

// ---- frontends -------------------------------------------------------

async function detectFrontend() {
  try {
    const r = await fetch('api/netlist', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source: 'module __probe__(); endmodule' }),
    });
    if (r.ok) { frontend = 'slang'; }
  } catch (e) { /* no server */ }
  if (!frontend) {
    try {
      const r = await fetch('vendor/slang.wasm', { method: 'HEAD' });
      if (r.ok) frontend = 'slang-wasm';
    } catch (e) { /* not staged */ }
  }
  if (!frontend) frontend = 'yosys';
  $frontend.textContent = {
    'slang': 'frontend: slang (server)',
    'slang-wasm': 'frontend: slang (wasm)',
    'yosys': 'frontend: yosys (wasm)',
  }[frontend];
}

let slangWasm = null;
async function compileSlangWasm(sources) {
  if (!slangWasm) {
    setStatus('slang-wasm 読み込み中…');
    const createSlangModule = (await import('./vendor/slang.mjs')).default;
    const m = await createSlangModule();
    const fn = m.cwrap('diagramgen_compile', 'number', ['string']);
    // Read the returned C string by copying out of the (resizable) wasm
    // heap first — TextDecoder refuses views on resizable ArrayBuffers.
    slangWasm = (input) => {
      const ptr = fn(input);
      let end = ptr;
      while (m.HEAPU8[end] !== 0) end++;
      return new TextDecoder().decode(m.HEAPU8.slice(ptr, end));
    };
  }
  const input = sources.map(f =>
    '\x01' + f.name.replaceAll('\x01', '_').replaceAll('\x02', '_') +
    '\x02' + f.content).join('');
  let out;
  try {
    out = JSON.parse(slangWasm(input));
  } catch (e) {
    return { ok: false, error: 'slang-wasm: ' + e };
  }
  if (out.error) return { ok: false, error: out.error };
  return { ok: true, netlist: out };
}

async function compileSlang(sources) {
  const resp = await fetch('api/netlist', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ files: sources }),
  });
  return resp.json();
}

async function ensureYosysMod() {
  if (!yosysMod) {
    setStatus('yosys-wasm 読み込み中…(初回は数十MBのダウンロード)');
    yosysMod = await import('./vendor/yowasp/bundle.js');
  }
  return yosysMod;
}

function yosysFiles(sources) {
  const fsFiles = {};
  const names = [];
  for (const f of sources) {
    const name = f.name.replaceAll('/', '_');
    fsFiles[name] = f.content;
    names.push(name);
  }
  return { fsFiles, names };
}

async function compileYosys(sources) {
  await ensureYosysMod();
  const { fsFiles, names } = yosysFiles(sources);
  const script = `read_verilog -sv ${names.join(' ')}; ` +
    'hierarchy -auto-top; proc; delete */t:$*; write_json out.json';
  let stderr = '';
  const decoder = new TextDecoder();
  try {
    const out = await yosysMod.runYosys(
      ['-q', '-p', script], fsFiles,
      { stdout: null, stderr: (b) => { if (b) stderr += decoder.decode(b); } },
    );
    return { ok: true, netlist: JSON.parse(String(out['out.json'])) };
  } catch (e) {
    return { ok: false, error: stderr || String(e) };
  }
}

// ---- FSM extraction (yosys fsm_export, works on any frontend) ----------

async function ensureFsms() {
  if (!fsmsStale) return;
  syncActive();
  setStatus('FSM抽出中…');
  await ensureYosysMod();
  const { fsFiles, names } = yosysFiles(files);
  const script = `read_verilog -sv ${names.join(' ')}; ` +
    'hierarchy -auto-top; proc; fsm_detect; fsm_extract; fsm_export; write_json fsm.json';
  fsms = [];
  try {
    const out = await yosysMod.runYosys(['-q', '-p', script], fsFiles,
                                        { stdout: null, stderr: null });
    const json = out['fsm.json'] ? JSON.parse(String(out['fsm.json'])) : null;
    for (const [fname, content] of Object.entries(out)) {
      if (fname.endsWith('.kiss2')) fsms.push(parseFsm(fname, String(content), json));
    }
  } catch (e) { /* compile error: leave fsms empty */ }
  fsmsStale = false;
}

function parseFsm(fname, kiss, json) {
  const modName = fname.split('-$fsm$')[0];
  const sigMatch = fname.match(/\$fsm\$\\?(.+?)\$\d+\.kiss2$/);
  const sig = sigMatch ? sigMatch[1] : 'fsm';

  let reset = null;
  const trans = [];
  const states = new Set();
  for (const line of kiss.split('\n').map(l => l.trim()).filter(Boolean)) {
    if (line.startsWith('.r ')) { reset = line.slice(3).trim(); continue; }
    if (line.startsWith('.')) continue;
    const [inp, from, to] = line.split(/\s+/);
    if (!to) continue;
    states.add(from); states.add(to);
    trans.push({ from, to, inp });
  }

  // Recover CTRL_IN signal names from the $fsm cell in the JSON dump.
  // KISS2 input columns are MSB-first: leftmost char = highest CTRL_IN bit.
  let inputs = [];
  const mod = json?.modules?.[modName];
  if (mod) {
    const cell = Object.values(mod.cells || {}).find(c =>
      c.type === '$fsm' && (c.parameters?.NAME || '').replace(/^\\/, '') === sig);
    if (cell) {
      inputs = (cell.connections.CTRL_IN || []).map((bit, i) => {
        const named = Object.entries(mod.netnames || {}).find(([n, nn]) =>
          !n.startsWith('$') && (nn.bits || []).includes(bit));
        return named ? named[0] : `in${i}`;
      });
    }
  }

  const edgeMap = new Map();
  for (const t of trans) {
    const label = [...t.inp].reverse()
      .map((ch, i) => ch === '-' ? null : `${inputs[i] ?? 'in' + i}=${ch}`)
      .filter(Boolean).join(' & ');
    const key = t.from + '>' + t.to;
    if (!edgeMap.has(key)) edgeMap.set(key, { from: t.from, to: t.to, labels: new Set() });
    edgeMap.get(key).labels.add(label);
  }
  const edges = [...edgeMap.values()].map(e => ({
    from: e.from, to: e.to,
    label: [...e.labels].filter(Boolean).join(' | '),
  }));
  return { name: `${modName}.${sig}`, states: [...states], reset, edges };
}

function escapeXml(s) {
  return s.replace(/[&<>"]/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}

// With 非表示ルール適用 ON, reset arcs disappear from the state graph:
// per hidden input, the value that alone jumps to the reset state is taken
// as "reset active"; alternatives requiring it are dropped and the other
// polarity is stripped from remaining conditions.
function fsmVisibleEdges(fsm) {
  if (!document.getElementById('hideClk').checked) return fsm.edges;
  // Tally which value of each hidden input jumps to reset from the most
  // states — that's the reset-active polarity (a normal transition into the
  // reset state from one state must not poison the vote).
  const votes = new Map();  // sig -> val -> Set(sources)
  for (const e of fsm.edges) {
    if (e.to !== fsm.reset || !e.label) continue;
    for (const alt of e.label.split(' | ')) {
      const terms = alt.split(' & ');
      if (terms.length !== 1) continue;
      const [sig, val] = terms[0].split('=');
      if (!matchesHiddenRule(sig)) continue;
      if (!votes.has(sig)) votes.set(sig, new Map());
      if (!votes.get(sig).has(val)) votes.get(sig).set(val, new Set());
      votes.get(sig).get(val).add(e.from);
    }
  }
  const resetVal = new Map();
  for (const [sig, byVal] of votes) {
    const best = [...byVal.entries()].sort((a, b) => b[1].size - a[1].size)[0];
    if (best && best[1].size >= 2) resetVal.set(sig, best[0]);
  }
  const out = [];
  for (const e of fsm.edges) {
    if (!e.label) { out.push(e); continue; }
    const alts = [];
    let unconditional = false;
    for (const alt of e.label.split(' | ')) {
      const terms = alt.split(' & ');
      if (terms.some(term => {
        const [sig, val] = term.split('=');
        return resetVal.get(sig) === val;
      })) continue;
      const kept = terms.filter(term => !matchesHiddenRule(term.split('=')[0]));
      if (!kept.length) unconditional = true;
      else alts.push(kept.join(' & '));
    }
    if (!alts.length && !unconditional) continue;  // fires only under reset
    out.push({ ...e, label: unconditional ? '' : [...new Set(alts)].join(' | ') });
  }
  return out;
}

async function renderFsmDiagram(fsm) {
  const t = THEMES[theme];
  document.getElementById('right').style.background = t.bg;
  const nodes = fsm.states.map(s => ({
    id: s, width: Math.max(52, s.length * 9 + 26), height: 30,
  }));
  const edges = fsmVisibleEdges(fsm).map((e, i) => ({
    id: 'e' + i, sources: [e.from], targets: [e.to],
    labels: e.label
      ? [{ text: e.label, width: e.label.length * 6.4 + 8, height: 13 }]
      : [],
  }));
  const g = await new netlistsvg.ELK().layout({
    id: 'root',
    layoutOptions: {
      'elk.algorithm': 'layered',
      'elk.direction': 'DOWN',
      'elk.spacing.nodeNode': '45',
      'elk.layered.spacing.nodeNodeBetweenLayers': '55',
      'elk.spacing.edgeLabel': '4',
    },
    children: nodes, edges,
  });
  const parts = [];
  parts.push(`<defs><marker id="fsmarrow" viewBox="0 0 10 10" refX="9" refY="5" ` +
    `markerWidth="7" markerHeight="7" orient="auto-start-reverse">` +
    `<path d="M0,0 L10,5 L0,10 z" fill="${t.wire}" stroke="none"/></marker></defs>`);
  for (const e of g.edges || []) {
    for (const s of e.sections || []) {
      const pts = [s.startPoint, ...(s.bendPoints || []), s.endPoint]
        .map(p => `${p.x},${p.y}`).join(' ');
      parts.push(`<polyline points="${pts}" fill="none" stroke="${t.wire}" ` +
        `stroke-width="1.3" marker-end="url(#fsmarrow)"/>`);
    }
    for (const l of e.labels || []) {
      parts.push(`<text x="${l.x + l.width / 2}" y="${l.y + 10}" text-anchor="middle" ` +
        `style="font: 10px ${t.font}; fill: ${t.text}">${escapeXml(l.text)}</text>`);
    }
  }
  for (const n of g.children || []) {
    const isReset = n.id === fsm.reset;
    parts.push(`<rect x="${n.x}" y="${n.y}" width="${n.width}" height="${n.height}" ` +
      `rx="15" fill="${t.marker}" stroke="${isReset ? '#ff5d8f' : t.markerStroke}" ` +
      `stroke-width="${isReset ? 2.2 : 1.4}"/>`);
    parts.push(`<text x="${n.x + n.width / 2}" y="${n.y + n.height / 2 + 3.8}" ` +
      `text-anchor="middle" style="font: 600 11px ${t.font}; fill: ${t.text}">` +
      `${escapeXml(n.id)}</text>`);
  }
  $diagram.innerHTML =
    `<svg xmlns="http://www.w3.org/2000/svg" width="${Math.ceil(g.width)}" ` +
    `height="${Math.ceil(g.height)}">${parts.join('')}</svg>`;
  document.getElementById('legend')?.remove();
}

function updateFsmList() {
  $module.innerHTML = '';
  fsms.forEach((f, i) => {
    const opt = document.createElement('option');
    opt.value = String(i);
    opt.textContent = f.name;
    $module.appendChild(opt);
  });
}

// ---- compile & render ------------------------------------------------

async function compile() {
  syncActive();
  setStatus('コンパイル中…');
  const sources = files.map(f => ({ name: f.name, content: f.content }));
  const result = frontend === 'slang' ? await compileSlang(sources)
    : frontend === 'slang-wasm' ? await compileSlangWasm(sources)
    : await compileYosys(sources);
  if (!result.ok) {
    showErrors(result.error);
    $errors.style.display = 'block';
    $diagram.classList.add('stale');
    setStatus('エラー', true);
    return;
  }
  $errors.style.display = 'none';
  netlist = result.netlist;
  fsmsStale = true;
  if (viewMode === 'fsm') {
    await ensureFsms();
    updateFsmList();
  } else {
    updateModuleList();
  }
  await renderModule();
}

function updateModuleList() {
  const names = Object.keys(netlist.modules);
  const prev = $module.value;
  $module.innerHTML = '';
  for (const name of names) {
    const opt = document.createElement('option');
    opt.value = opt.textContent = name;
    $module.appendChild(opt);
  }
  if (names.includes(prev)) {
    $module.value = prev;
  } else {
    const top = names.find(n => Number(netlist.modules[n].attributes?.top) === 1
      || /1$/.test(String(netlist.modules[n].attributes?.top ?? '')));
    $module.value = top ?? names[0];
  }
}

// Deterministic hue per module type name.
function hueOf(name) {
  let h = 0;
  for (const c of name) h = (h * 31 + c.codePointAt(0)) >>> 0;
  return h % 360;
}

// ---- datasheet-style net labels ---------------------------------------
// Nets are classified by user-editable rules (regex -> label/color) and get
// a colored capsule label on their longest wire segment, plus a legend —
// in the spirit of hand-drawn datasheet block diagrams. Rules are edited
// in the UI (色ルール) and persisted to localStorage; first match wins.

const DEFAULT_RULES = [
  { pattern: 'axi',                  label: 'AXI',     color: '#e8863a' },
  { pattern: 'i2c|i2s|scl|sda',      label: 'I2C/I2S', color: '#1565c0' },
  { pattern: 'spi|mosi|miso|sclk',   label: 'SPI',     color: '#7cc0f4' },
  { pattern: 'uart|usart|txd?$|rxd?$', label: 'UART',  color: '#c85d96' },
  { pattern: 'pwm',                  label: 'PWM',     color: '#8ee6b8' },
  { pattern: 'clk|clock|rst|reset',  label: 'CLK/RST', color: '#e0e0e4', hide: true },
];
const OTHER_RULE = { label: 'Other', color: '#ffffff' };

function loadRules() {
  try {
    const r = JSON.parse(localStorage.getItem('diagramgen-netrules'));
    if (Array.isArray(r)) {
      // Migration: rules saved before the hide flag existed get it on the
      // clk-ish rule so the header toggle keeps working.
      if (!r.some(x => 'hide' in x)) {
        for (const x of r) if (/clk|rst/i.test(x.pattern)) x.hide = true;
      }
      return r;
    }
  } catch (e) { /* fall through */ }
  return JSON.parse(JSON.stringify(DEFAULT_RULES));
}
let rules = loadRules();
function saveRules() {
  localStorage.setItem('diagramgen-netrules', JSON.stringify(rules));
}

function loadJSON(key, fallback) {
  try {
    const v = JSON.parse(localStorage.getItem(key));
    if (v !== null && typeof v === typeof fallback) return v;
  } catch (e) { /* fall through */ }
  return fallback;
}

// Module color rules: regex on the module type name -> fixed color
// (and optional hiding of matching instances). First match wins;
// unmatched modules fall back to the theme palette by name hash.
let modRules = loadJSON('diagramgen-modrules', []);
const saveModRules = () =>
  localStorage.setItem('diagramgen-modrules', JSON.stringify(modRules));

function classifyModule(type) {
  for (const r of modRules) {
    try {
      if (r.pattern && new RegExp(r.pattern, 'i').test(type)) return r;
    } catch (e) { /* invalid user regex: skip */ }
  }
  return null;
}

// Tunables (editable in the settings dialog).
const DEFAULT_SETTINGS = { debounceMs: 500, labelMinSeg: 60 };
let settings = { ...DEFAULT_SETTINGS, ...loadJSON('diagramgen-settings', {}) };
const saveSettings = () =>
  localStorage.setItem('diagramgen-settings', JSON.stringify(settings));

// Derive readable text/stroke colors from the rule's fill color.
function ruleStyle(color) {
  const [r, g, b] = [1, 3, 5].map(i => parseInt(color.slice(i, i + 2), 16) || 0);
  const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
  return {
    fill: color,
    text: lum > 0.62 ? '#1a1a1a' : '#ffffff',
    stroke: `rgb(${r * 0.55 | 0} ${g * 0.55 | 0} ${b * 0.55 | 0})`,
  };
}

function classifyNet(name) {
  for (const rule of rules) {
    try {
      if (rule.pattern && new RegExp(rule.pattern, 'i').test(name)) return rule;
    } catch (e) { /* invalid user regex: skip */ }
  }
  return OTHER_RULE;
}

function drawNetLabels(svg, mod) {
  legendNet.clear();
  // Obstacles (cell bodies + already-placed labels) for collision avoidance.
  const off = svg.getBoundingClientRect();
  const obstacles = [...svg.querySelectorAll('g[id^="cell_"] rect, text')].map(r => {
    const b = r.getBoundingClientRect();
    return { x: b.x - off.x, y: b.y - off.y, w: b.width, h: b.height };
  });
  const collides = (x, y, w, h) =>
    obstacles.some(o => x < o.x + o.w && x + w > o.x && y < o.y + o.h && y + h > o.y);

  for (const [name, nn] of Object.entries(mod.netnames || {})) {
    if (nn.hide_name || name.startsWith('$')) continue;
    const id = (nn.bits || []).find(b => typeof b === 'number');
    if (id == null) continue;
    const segs = [...svg.querySelectorAll(`line.${CSS.escape('net_' + id)}`)];
    if (!segs.length) continue;
    const shown = name.length * 6.2 + 16;
    const cands = segs.map(s => {
      const dx = Math.abs(s.x2.baseVal.value - s.x1.baseVal.value);
      const dy = Math.abs(s.y2.baseVal.value - s.y1.baseVal.value);
      return { s, len: dx + dy + (dx > dy ? 15 : 0) };  // prefer horizontal runs
    }).sort((a, b) => b.len - a.len);
    const minSeg = Math.max(settings.labelMinSeg, shown);
    if (!cands.length || cands[0].len < minSeg) continue;
    let mx = null, my = null;
    place:
    for (const c of cands) {
      if (c.len < minSeg) break;
      const cx = (c.s.x1.baseVal.value + c.s.x2.baseVal.value) / 2;
      const cy = (c.s.y1.baseVal.value + c.s.y2.baseVal.value) / 2;
      for (const dy of [0, -13, 13]) {
        if (!collides(cx - shown / 2, cy - 7.5 + dy, shown, 15)) {
          mx = cx; my = cy + dy;
          break place;
        }
      }
      if (mx === null) { mx = cx; my = cy; }  // fallback: best segment
    }
    obstacles.push({ x: mx - shown / 2, y: my - 7.5, w: shown, h: 15 });
    const cls = classifyNet(name);
    const st = ruleStyle(cls.color);
    legendNet.add(cls.label);
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', mx - shown / 2); rect.setAttribute('y', my - 7.5);
    rect.setAttribute('width', shown); rect.setAttribute('height', 15);
    rect.setAttribute('rx', 7.5);
    rect.setAttribute('fill', st.fill); rect.setAttribute('stroke', st.stroke);
    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', mx); label.setAttribute('y', my + 3.2);
    label.setAttribute('text-anchor', 'middle');
    label.setAttribute('style', `font-size:9.5px; fill:${st.text} !important; font-weight:600;`);
    label.textContent = name;
    g.append(rect, label);
    svg.append(g);
  }
}

function renderLegend() {
  document.getElementById('legend')?.remove();
  if (!legendNet.size && !legendMod.size) return;
  const div = document.createElement('div');
  div.id = 'legend';
  const addItem = (color, label, square) => {
    const item = document.createElement('span');
    const sw = document.createElement('span');
    sw.className = 'sw';
    sw.style.background = color;
    if (square) sw.style.borderRadius = '2px';
    item.append(sw, label);
    div.appendChild(item);
  };
  for (const r of modRules) {
    if (legendMod.has(r.label)) addItem(r.color, r.label, true);
  }
  for (const c of [...rules, OTHER_RULE]) {
    if (legendNet.has(c.label)) addItem(c.color, c.label, false);
  }
  document.getElementById('right').appendChild(div);
}

// Remove plumbing matched by hide-flagged rules from a module (datasheet
// diagrams omit clock/reset wiring; users can hide any class this way).
function matchesHiddenRule(name) {
  for (const rule of rules) {
    if (!rule.hide || !rule.pattern) continue;
    try {
      if (new RegExp(rule.pattern, 'i').test(name)) return true;
    } catch (e) { /* invalid user regex: skip */ }
  }
  return false;
}

function pruneHiddenNets(mod) {
  // Instances of hide-flagged module rules disappear from the diagram.
  for (const [inst, cell] of Object.entries(mod.cells || {})) {
    const mr = classifyModule(cell.type);
    if (mr?.hide) delete mod.cells[inst];
  }
  const hidden = new Set();
  for (const [name, nn] of Object.entries(mod.netnames || {})) {
    if (matchesHiddenRule(name)) (nn.bits || []).forEach(b => hidden.add(b));
  }
  for (const [pname, port] of Object.entries(mod.ports || {})) {
    if (matchesHiddenRule(pname)) {
      (port.bits || []).forEach(b => hidden.add(b));
      delete mod.ports[pname];
    }
  }
  for (const cell of Object.values(mod.cells || {})) {
    for (const [pn, bits] of Object.entries(cell.connections || {})) {
      if (matchesHiddenRule(pn) || (bits.length && bits.every(b => hidden.has(b)))) {
        delete cell.connections[pn];
        delete cell.port_directions?.[pn];
      }
    }
  }
  for (const [name, nn] of Object.entries(mod.netnames || {})) {
    if ((nn.bits || []).some(b => hidden.has(b))) delete mod.netnames[name];
  }
}

const SVGNS = 'http://www.w3.org/2000/svg';
const legendNet = new Set();  // net-rule labels present in the diagram
const legendMod = new Set();  // module-rule labels present in the diagram

// ---- semantic ordering ---------------------------------------------------
// Masters drive more nets into their slaves than they get back (addr/wdata/
// we vs. a single rdata), so a majority vote over net directions yields the
// architectural order (CPU -> interconnect -> peripherals) without any AI.
// Cycles (e.g. an irq line back into the CPU) are broken by dropping the
// weakest edges; the resulting layers become ELK partition constraints.

function computePartitions(mod) {
  const nets = new Map();
  const touch = (id) => {
    if (!nets.has(id)) nets.set(id, { drivers: new Set(), sinks: new Set() });
    return nets.get(id);
  };
  for (const [pname, p] of Object.entries(mod.ports || {})) {
    for (const b of p.bits || []) {
      if (typeof b !== 'number') continue;
      (p.direction === 'input' ? touch(b).drivers : touch(b).sinks)
        .add('$port:' + pname);
    }
  }
  for (const [cname, c] of Object.entries(mod.cells || {})) {
    for (const [pn, bits] of Object.entries(c.connections || {})) {
      const dir = c.port_directions?.[pn];
      for (const b of bits || []) {
        if (typeof b !== 'number') continue;
        if (dir === 'output') touch(b).drivers.add(cname);
        else if (dir === 'input') touch(b).sinks.add(cname);
        else { touch(b).drivers.add(cname); touch(b).sinks.add(cname); }
      }
    }
  }
  const w = new Map();
  for (const { drivers, sinks } of nets.values()) {
    for (const a of drivers) for (const b of sinks) {
      if (a !== b) w.set(a + '>' + b, (w.get(a + '>' + b) || 0) + 1);
    }
  }
  const cells = Object.keys(mod.cells || {});
  const margins = [];
  for (const a of cells) for (const b of cells) {
    if (a === b) continue;
    const m = (w.get(a + '>' + b) || 0) - (w.get(b + '>' + a) || 0);
    if (m > 0) margins.push([a, b, m]);
  }
  margins.sort((x, y) => y[2] - x[2]);
  const adj = new Map(cells.map(c => [c, new Set()]));
  const reaches = (src, dst) => {
    const stack = [src], seen = new Set();
    while (stack.length) {
      const n = stack.pop();
      if (n === dst) return true;
      if (seen.has(n)) continue;
      seen.add(n);
      for (const nx of adj.get(n)) stack.push(nx);
    }
    return false;
  };
  for (const [a, b] of margins) if (!reaches(b, a)) adj.get(a).add(b);
  const layer = new Map(cells.map(c => [c, 0]));
  for (let i = 0; i < cells.length; i++) {
    let changed = false;
    for (const a of cells) for (const b of adj.get(a)) {
      if (layer.get(b) < layer.get(a) + 1) { layer.set(b, layer.get(a) + 1); changed = true; }
    }
    if (!changed) break;
  }
  const maxL = Math.max(0, ...layer.values());
  const part = new Map();
  for (const [pname, p] of Object.entries(mod.ports || {})) {
    part.set(pname, p.direction === 'output' ? maxL + 2 : 0);
  }
  for (const c of cells) part.set(c, layer.get(c) + 1);
  return part;
}

function stylize(mod) {
  const svg = $diagram.querySelector('svg');
  if (!svg) return;
  const t = THEMES[theme];
  document.getElementById('right').style.background = t.bg;
  const style = document.createElementNS(SVGNS, 'style');
  style.textContent = `
    text { font-family: ${t.font} !important; fill: ${t.text} !important; }
    line { stroke: ${t.wire}; stroke-width: ${t.wireWidth}; stroke-linecap: round; }
    circle { fill: ${t.wire} !important; r: 2.4px; stroke: ${t.bg}; stroke-width: 1.2; }
    path { fill: ${t.marker}; stroke: ${t.markerStroke}; stroke-width: 1.25;
           stroke-linejoin: round; }
    text.dg-inst { font-size: 8.5px; font-weight: 400; fill: ${t.wire} !important;
                   text-anchor: middle; }
  `;
  svg.append(style);
  if (t.shadow) {
    const defs = document.createElementNS(SVGNS, 'defs');
    defs.innerHTML = '<filter id="dgshadow" x="-20%" y="-20%" width="140%" height="150%">' +
      '<feDropShadow dx="0" dy="1" stdDeviation="1.3" flood-color="#000" flood-opacity="0.22"/></filter>';
    svg.prepend(defs);
  }
  legendMod.clear();
  for (const [inst, cell] of Object.entries(mod.cells || {})) {
    if (cell.type.startsWith('$')) continue;
    const g = svg.querySelector(`#${CSS.escape('cell_' + inst)}`);
    if (!g) continue;
    const idx = hueOf(cell.type) % 10;
    const mr = classifyModule(cell.type);
    if (mr) legendMod.add(mr.label);
    const st = mr ? ruleStyle(mr.color) : null;
    for (const rect of g.querySelectorAll(':scope > rect, rect')) {
      rect.setAttribute('fill', st ? st.fill : t.cellFill(idx));
      rect.setAttribute('stroke', st ? st.stroke : t.cellStroke(idx));
      rect.setAttribute('stroke-width', '1.5');
      rect.setAttribute('rx', '4');
      if (t.shadow) rect.setAttribute('filter', 'url(#dgshadow)');
      break; // only the body rect
    }
    // Two-line header: bold type name, dim instance name below it.
    const typeLabel = g.querySelector('text.nodelabel');
    if (typeLabel && inst && inst !== cell.type) {
      typeLabel.setAttribute('y', Number(typeLabel.getAttribute('y')) - 10);
      const sub = document.createElementNS(SVGNS, 'text');
      sub.setAttribute('x', typeLabel.getAttribute('x'));
      sub.setAttribute('y', Number(typeLabel.getAttribute('y')) + 10);
      sub.setAttribute('class', 'dg-inst');
      sub.textContent = inst;
      typeLabel.after(sub);
    }
  }
}

// elkjs deadlocks if two layouts run concurrently, so renders are
// serialized: at most one in flight, at most one queued.
let renderBusy = false;
let renderQueued = false;

async function renderModule() {
  if (renderBusy) { renderQueued = true; return; }
  renderBusy = true;
  try {
    await doRenderModule();
  } finally {
    renderBusy = false;
    if (renderQueued) { renderQueued = false; renderModule(); }
  }
}

async function doRenderModule() {
  if (viewMode === 'fsm') {
    const fsm = fsms[Number($module.value)];
    if (!fsm) {
      $diagram.innerHTML = '';
      document.getElementById('legend')?.remove();
      setStatus('FSMが見つかりません — 状態レジスタに (* fsm_encoding = "auto" *) を付けると検出されます(FSM抽出はyosysを使うため、interface等yosysが解析できない構文を含む設計では利用できません)', true);
      return;
    }
    await renderFsmDiagram(fsm);
    if (fitPending) { fitPending = false; fitView(); } else { applyView(); }
    $diagram.classList.remove('stale');
    setStatus('OK');
    return;
  }
  if (!netlist) return;
  const skin = await getSkin(THEMES[theme].skin);
  const copy = JSON.parse(JSON.stringify(netlist));
  for (const [name, mod] of Object.entries(copy.modules)) {
    mod.attributes = mod.attributes || {};
    mod.attributes.top = name === $module.value ? 1 : 0;
  }
  const mod = copy.modules[$module.value];
  if (document.getElementById('hideClk').checked) pruneHiddenNets(mod);
  try {
    const g = netlistsvg.buildGraph(skin, copy);
    const extra = {};
    if (document.getElementById('semanticOrder').checked) {
      const part = computePartitions(mod);
      for (const child of g.kgraph.children) {
        if (part.has(child.id)) {
          child.layoutOptions = Object.assign({}, child.layoutOptions,
            { 'org.eclipse.elk.partitioning.partition': part.get(child.id) });
        }
      }
      extra['org.eclipse.elk.partitioning.activate'] = true;
    }
    const layouted = await new netlistsvg.ELK().layout(g.kgraph, {
      layoutOptions: Object.assign({}, g.layoutProps.layoutEngine, extra),
    });
    const svg = g.draw(layouted);
    $diagram.innerHTML = svg;
    stylize(mod);
    if (document.getElementById('showLabels').checked) {
      drawNetLabels($diagram.querySelector('svg'), mod);
    } else {
      legendNet.clear();
    }
    renderLegend();
    currentModule = mod;
    buildNetNames(mod);
    if (fitPending) { fitPending = false; fitView(); } else { applyView(); }
    $diagram.classList.remove('stale');
    setStatus('OK');
  } catch (e) {
    setStatus('レイアウト失敗: ' + e.message, true);
  }
}

function buildNetNames(mod) {
  netNameById.clear();
  for (const [name, nn] of Object.entries(mod.netnames || {})) {
    if (nn.hide_name || name.startsWith('$')) continue;
    for (const b of nn.bits || []) {
      if (typeof b === 'number' && !netNameById.has(b)) netNameById.set(b, name);
    }
  }
}

// ---- pan / zoom --------------------------------------------------------

const $wrap = document.getElementById('diagramWrap');

function applyView() {
  const svg = $diagram.querySelector('svg');
  if (svg) svg.style.transform =
    `translate(${view.tx}px, ${view.ty}px) scale(${view.s})`;
}

function svgSize() {
  const svg = $diagram.querySelector('svg');
  if (!svg) return null;
  return { w: Number(svg.getAttribute('width')) || svg.getBBox().width,
           h: Number(svg.getAttribute('height')) || svg.getBBox().height };
}

function fitView() {
  const dim = svgSize();
  if (!dim) return;
  const pw = $wrap.clientWidth, ph = $wrap.clientHeight;
  view.s = Math.min((pw - 40) / dim.w, (ph - 40) / dim.h, 1.5);
  view.tx = (pw - dim.w * view.s) / 2;
  view.ty = (ph - dim.h * view.s) / 2;
  applyView();
}

function zoomAt(px, py, factor) {
  const s = Math.min(8, Math.max(0.05, view.s * factor));
  const real = s / view.s;
  view.tx = px - real * (px - view.tx);
  view.ty = py - real * (py - view.ty);
  view.s = s;
  applyView();
}

$wrap.addEventListener('wheel', (e) => {
  e.preventDefault();
  const r = $wrap.getBoundingClientRect();
  zoomAt(e.clientX - r.left, e.clientY - r.top, e.deltaY < 0 ? 1.15 : 1 / 1.15);
}, { passive: false });

let pan = null;
$wrap.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  pan = { x: e.clientX, y: e.clientY };
  $wrap.classList.add('panning');
});
window.addEventListener('mousemove', (e) => {
  if (!pan) return;
  view.tx += e.clientX - pan.x;
  view.ty += e.clientY - pan.y;
  pan = { x: e.clientX, y: e.clientY };
  applyView();
});
window.addEventListener('mouseup', () => {
  pan = null;
  $wrap.classList.remove('panning');
});

document.getElementById('zoomIn').onclick = () =>
  zoomAt($wrap.clientWidth / 2, $wrap.clientHeight / 2, 1.25);
document.getElementById('zoomOut').onclick = () =>
  zoomAt($wrap.clientWidth / 2, $wrap.clientHeight / 2, 1 / 1.25);
document.getElementById('zoomFit').onclick = fitView;

// ---- net hover highlight -----------------------------------------------

const $tooltip = document.getElementById('tooltip');
let hiClass = null;

function clearHighlight() {
  if (!hiClass) return;
  for (const el of $diagram.querySelectorAll('line.hi')) el.classList.remove('hi');
  hiClass = null;
  $tooltip.style.display = 'none';
}

$diagram.addEventListener('mouseover', (e) => {
  const line = e.target.closest('line');
  if (!line) { clearHighlight(); return; }
  const cls = [...line.classList].find(c => c.startsWith('net_'));
  if (!cls || cls === hiClass) return;
  clearHighlight();
  hiClass = cls;
  for (const el of $diagram.querySelectorAll(`line.${CSS.escape(cls)}`)) {
    el.classList.add('hi');
  }
  const name = netNameById.get(Number(cls.slice(4)));
  if (name) {
    $tooltip.textContent = name;
    $tooltip.style.display = 'block';
  }
});
$diagram.addEventListener('mousemove', (e) => {
  if ($tooltip.style.display === 'block') {
    $tooltip.style.left = (e.clientX + 14) + 'px';
    $tooltip.style.top = (e.clientY + 14) + 'px';
  }
});
$diagram.addEventListener('mouseleave', clearHighlight);

// ---- hierarchy drill-down ----------------------------------------------

function updateBackBtn() {
  document.getElementById('navBack').style.display =
    navStack.length ? '' : 'none';
}

$diagram.addEventListener('dblclick', (e) => {
  if (viewMode !== 'block') return;
  const g = e.target.closest('g[id^="cell_"]');
  if (!g || !currentModule) return;
  const cell = (currentModule.cells || {})[g.id.slice(5)];
  if (!cell || !netlist.modules[cell.type]) return;
  navStack.push($module.value);
  $module.value = cell.type;
  fitPending = true;
  updateBackBtn();
  renderModule();
});

document.getElementById('navBack').onclick = () => {
  const prev = navStack.pop();
  if (prev && netlist.modules[prev]) {
    $module.value = prev;
    fitPending = true;
    renderModule();
  }
  updateBackBtn();
};

// ---- download ----------------------------------------------------------

function svgText() {
  const svg = $diagram.querySelector('svg');
  if (!svg) return null;
  const clone = svg.cloneNode(true);
  clone.style.transform = '';
  return new XMLSerializer().serializeToString(clone);
}

function download(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}

document.getElementById('dlSvg').onclick = () => {
  const text = svgText();
  if (text) download(new Blob([text], { type: 'image/svg+xml' }),
                     `${$module.value}.svg`);
};

document.getElementById('dlPng').onclick = () => {
  const text = svgText();
  const dim = svgSize();
  if (!text || !dim) return;
  const img = new Image();
  const url = URL.createObjectURL(new Blob([text], { type: 'image/svg+xml' }));
  img.onload = () => {
    const scale = 2;
    const canvas = document.createElement('canvas');
    canvas.width = dim.w * scale;
    canvas.height = dim.h * scale;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = THEMES[theme].bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.scale(scale, scale);
    ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);
    canvas.toBlob(b => download(b, `${$module.value}.png`), 'image/png');
  };
  img.src = url;
};

// ---- clickable error locations -----------------------------------------

function showErrors(text) {
  $errors.innerHTML = '';
  const re = /(\S+?):(\d+):(\d+)/g;
  let last = 0, m;
  while ((m = re.exec(text)) !== null) {
    $errors.append(text.slice(last, m.index));
    const a = document.createElement('span');
    a.className = 'errloc';
    a.textContent = m[0];
    a.dataset.file = m[1]; a.dataset.line = m[2]; a.dataset.col = m[3];
    $errors.appendChild(a);
    last = m.index + m[0].length;
  }
  $errors.append(text.slice(last));
}

$errors.addEventListener('click', (e) => {
  const loc = e.target.closest('.errloc');
  if (!loc) return;
  const idx = files.findIndex(f =>
    f.name === loc.dataset.file || f.name.endsWith('/' + loc.dataset.file));
  if (idx >= 0 && idx !== active) {
    syncActive();
    active = idx;
    $src.value = files[active].content;
    renderTabs();
  }
  const line = Number(loc.dataset.line), col = Number(loc.dataset.col);
  const lines = $src.value.split('\n');
  let off = 0;
  for (let i = 0; i < line - 1 && i < lines.length; i++) off += lines[i].length + 1;
  off += col - 1;
  $src.focus();
  $src.setSelectionRange(off, off);
  const lineHeight = 12.5 * 1.5;
  $src.scrollTop = Math.max(0, (line - 1) * lineHeight - $src.clientHeight / 3);
});

// ---- wiring ------------------------------------------------------------

$src.addEventListener('input', () => {
  clearTimeout(timer);
  timer = setTimeout(() => { persistSrc(); compile(); }, settings.debounceMs);
});
$module.addEventListener('change', () => { fitPending = true; renderModule(); });
document.getElementById('showLabels').addEventListener('change', renderModule);
document.getElementById('hideClk').addEventListener('change', renderModule);
document.getElementById('semanticOrder').addEventListener('change', () => {
  fitPending = true;
  renderModule();
});
document.getElementById('viewMode').addEventListener('change', async (e) => {
  viewMode = e.target.value;
  navStack.length = 0;
  updateBackBtn();
  if (viewMode === 'fsm') {
    await ensureFsms();
    updateFsmList();
  } else {
    updateModuleList();
  }
  fitPending = true;
  await renderModule();
});

async function loadSample() {
  const sample = await fetch('sample.sv');
  if (sample.ok) {
    files = [{ name: 'soc.sv', content: await sample.text() }];
    active = 0;
    $src.value = files[0].content;
  }
}

(async function init() {
  if (restoreSrc()) {
    $src.value = files[active].content;
  } else {
    await loadSample();
  }
  renderTabs();
  await detectFrontend();
  await compile();
})();
</script>
